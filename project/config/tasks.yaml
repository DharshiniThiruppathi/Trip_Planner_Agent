# =============================================================================
# TASKS -- the "WHAT" of your crew.
#
# Every task needs:
#   description      -> precise instructions. Anything inside {curly_braces}
#                        gets filled in at runtime by graph_workflow.py
#                        using Python's str.format().
#   expected_output   -> tells the agent EXACTLY what shape the answer
#                        should take. This is the #1 lever for getting
#                        consistent, parseable output out of an LLM. Be
#                        strict here -- especially about any line your
#                        Python code needs to read back out later.
#
# The first two tasks are COMPLETE worked examples. Notice how strict their
# expected_output sections are about machine-readable lines (VERDICT:,
# SUGGESTED_BUDGET_INR:, BASE CITY:) -- your Python code parses those exact
# lines back out of the LLM's free text. Copy that trick in your own tasks.
# =============================================================================

feasibility_task:
  description: >
    A traveler from India wants this trip:
      Destination (may be a city, a state, or a whole country): {destination}
      Expectations: {expectations}
      Trip length: {trip_length_days} days.
      TOTAL budget for the whole trip: Rs. {budget_inr} (Indian Rupees, INR).

    Your job is a REALITY CHECK, not a plan. Estimate the realistic MINIMUM
    total cost (in INR) of meeting those expectations at that destination
    for that many days -- include getting there from India (or within India),
    staying, eating, and the activities their expectations imply.

    Use the web search tool if you need current price levels, and use the
    Currency Converter tool for ANY price you find in a foreign currency --
    never convert in your head.

    Then compare that realistic minimum with their stated budget:
      - Budget comfortably covers it        -> verdict REALISTIC
      - Budget is close (within ~25% short) -> verdict TIGHT
      - Budget is far below what's needed   -> verdict UNREALISTIC
  expected_output: >
    Your FIRST line must be exactly:  "VERDICT: <REALISTIC or TIGHT or UNREALISTIC>"
    Your SECOND line must be exactly: "SUGGESTED_BUDGET_INR: <number>"
    (the logical total INR budget for these expectations -- no currency
    symbol, no commas; if their budget is fine, just repeat their budget).
    Then a short explanation (4-7 sentences): what the money realistically
    buys, where the biggest costs are, and -- if the verdict is TIGHT or
    UNREALISTIC -- what they COULD do instead at their stated budget (a
    nearer destination, fewer days, or scaled-down expectations).

destination_task:
  description: >
    A traveler gave this destination: {destination}
    (It may be a specific city, a state/region, or a whole country.)
    Their expectations for the trip: {expectations}.
    Trip length: {trip_length_days} days.

    Design a realistic ROUTE, not just one pin on the map:
      - Up to 4 days: ONE base city/town is usually right.
      - 5 to 7 days: TWO bases that pair naturally (a short hop apart).
      - 8+ days: TWO or THREE bases forming a sensible line or loop.
    Never add a base that eats half a day of travel to reach from the
    previous one unless the destination truly demands it -- travel time
    is stolen from the trip.

    If they already named one specific city, keep it as the anchor and
    only add a nearby second base if the trip length justifies it.

    For every base: say how many nights it gets. For every hop between
    bases: give the transport mode and APPROXIMATE door-to-door travel
    time (e.g. "Manali -> Kasol: local bus, ~3.5 hours").

    Use the web search tool to check at least one current, concrete fact
    (typical costs, weather, or a notable event or attraction) about your
    route before committing.
  expected_output: >
    Your FIRST line must be exactly:
    "BASES: <city 1>, <city 2>, ..." (comma-separated, in travel order --
    a single base is fine for short trips).
    Then the route plan: nights per base, each hop's transport mode with
    approximate travel time, and a short paragraph (3-5 sentences)
    explaining why this route fits their expectations, citing the fact(s)
    you found.

